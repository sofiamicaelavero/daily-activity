name: Daily commit

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README timestamp
        run: |
          DATE=$(TZ='America/Argentina/Buenos_Aires' date '+%Y-%m-%d %H:%M ART')
          sed -i "s/^Last updated: .*/Last updated: ${DATE}/" README.md

      - name: Commit and push changes
        run: |
          git config user.name "sofiamicaelavero"
          git config user.email "286189914+sofiamicaelavero@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily activity update"
            git push
          else
            echo "No changes to commit"
          fi
